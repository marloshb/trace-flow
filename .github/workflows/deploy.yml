name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Bun is the source of truth (bun.lockb). We intentionally do NOT use
      # `npm ci`, which would require package-lock.json to be perfectly in
      # sync with package.json — Lovable manages deps with Bun, so the
      # npm lockfile is often stale.
      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build
        env:
          GITHUB_PAGES: "true"
        run: bun run build

      - name: Copy 404.html for SPA fallback
        run: cp dist/index.html dist/404.html || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
